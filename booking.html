<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session | Paws & Claws</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">
                <h1>Paws &amp; <span>Claws</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="pricing.html">Pricing</a></li>
                    <li><a href="booking.html" class="active">Book Appointment</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2 style="text-align: center; margin-bottom: 1rem;">Schedule Your Intake Session</h2>
        <p style="text-align: center; margin-bottom: 2rem;">Provide your pet's current layout properties, and our staff will reach out to lock in your check-in time.</p>

        <!-- Form structures link directly back to layout styling -->
        <form action="#" method="POST" onsubmit="alert('Demo Submit Successful! Form logic complete.'); return false;">
            
            <div class="form-group">
                <label for="ownerName">Owner Full Name</label>
                <input type="text" id="ownerName" name="ownerName" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Contact Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="petType">Pet Family Type</label>
                <select id="petType" name="petType" required>
                    <option value="">-- Please Select --</option>
                    <option value="canine">Dog (Canine)</option>
                    <option value="feline">Cat (Feline)</option>
                    <option value="other">Exotic / Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="requestedService">Primary Service Needed</label>
                <select id="requestedService" name="requestedService" required>
                    <option value="grooming">Grooming Session</option>
                    <option value="daycare">Daycare Admission</option>
                    <option value="boarding">Overnight Stay</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">Special Medical or Dietary Accommodations</label>
                <textarea id="notes" name="notes" rows="4" placeholder="List any allergies, behavior quirks, or dietary preferences here..."></textarea>
            </div>

            <button type="submit">Submit Request</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Paws &amp; Claws Pet Care Services. All rights reserved.</p>
    </footer>

</body>
</html>
